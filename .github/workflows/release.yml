name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            exe: dbgraph
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            exe: dbgraph
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            exe: dbgraph
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            exe: dbgraph.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
            exe: dbgraph.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build dbgraph
        shell: bash
        run: cargo build -p dbgraph-cli --release --target "${{ matrix.target }}"
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package archive
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $target = "${{ matrix.target }}"
          $archive = "${{ matrix.archive }}"
          $exe = "${{ matrix.exe }}"
          $asset = "dbgraph-$tag-$target.$archive"
          $bin = Join-Path "target/$target/release" $exe
          if (-not (Test-Path $bin)) {
            throw "Binary not found: $bin"
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item $bin (Join-Path package $exe)

          if ($archive -eq "zip") {
            Compress-Archive -Path "package/*" -DestinationPath "dist/$asset" -Force
          } else {
            tar -czf "dist/$asset" -C package $exe
          }

          $hash = (Get-FileHash -Algorithm SHA256 "dist/$asset").Hash.ToLowerInvariant()
          "$hash  $asset" | Set-Content -NoNewline "dist/$asset.sha256"
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
